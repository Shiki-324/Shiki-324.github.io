<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="touch-events" content="true">
<title>鸣潮小站入站答题</title>
<style>
:root{
    --text-grad: linear-gradient(90deg,#006666,#00aaaa);
    --title-light-grad: linear-gradient(90deg,#005555,#008888);
    --ring-normal:#76e8e8;
    --ring-warn:#ff7777;
    --shadow-soft:0 1px 2px rgba(0,90,90,0.1);
    --btn-grad:linear-gradient(90deg,#ffd6e0,#bcf6f6);
    --right-grad:linear-gradient(90deg,#62e2a1,#27b968);
    --wrong-grad:linear-gradient(90deg,#ff9494,#e23838);
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,"PingFang SC",sans-serif;
    scroll-behavior: smooth;
    -webkit-tap-highlight-color: transparent;
}
body{
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
    background:#cbf5f5;
    transition: opacity 0.3s ease;
}
.bg-fixed{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    object-position:center top;
    z-index:-2;
    transform: translateZ(0) scale(1.01);
    backface-visibility: hidden;
    will-change: transform;
    transition: transform 0.2s linear;
}
.mask-layer{
    position:fixed;
    inset:0;
    background: rgba(255, 255, 255, 0.38);
    backdrop-filter: blur(1px);
    z-index:-1;
    transform: translateZ(0);
}
body::after{
    content:"";
    position:fixed;
    top:0;
    right:0;
    width:8px;
    height:100vh;
    background: linear-gradient(180deg, #bcf6f6 0%, #76e8e8 100%);
    z-index:1;
}
.top-bar{
    position:sticky;
    top:0;
    width:100%;
    height:60px;
    background:#ffb4c4;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 16px;
    z-index:10;
}
.top-icon{
    position:absolute;
    left:12px;
    font-size:26px;
    color:#000;
    background:transparent;
    border:none;
    cursor:pointer;
}
.top-title{
    font-size:18px;
    font-weight:600;
    background: var(--text-grad);
    -webkit-background-clip: text;
    color: transparent;
    text-shadow: 0 1px 2px rgba(0,120,120,0.12);
}
/* 倒计时移右上角、缩小尺寸，与标题同高 */
.count-wrap{
    position: fixed;
    top: 12px;
    right: 16px;
    width: 38px;
    height: 38px;
    z-index: 12;
    display: none;
}
.count-circle{
    position: absolute;
    inset:0;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    transition: background 0.3s;
    background: linear-gradient(180deg,#ffffff,#e0f8f8);
    -webkit-background-clip: text;
    color: transparent;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    font-size: 14px;
    font-weight: bold;
}
.count-progress{
    position:absolute;
    inset:-2px;
    width:42px;
    height:42px;
    border-radius:50%;
    z-index:1;
    transition: background 0.1s linear;
}
.count-wrap.warn .count-circle{
    background: linear-gradient(180deg,#ffeeee,#ffbbbb);
    -webkit-background-clip: text;
    color: transparent;
}
/* 缩小外层边距，卡片集中在屏幕下1/3 */
.main-wrap{
    padding:18px 14px;
    position:relative;
    z-index:2;
    max-width:750px;
    margin:0 auto;
}
.task-page,.quiz-page{
    transition: opacity 0.3s ease;
}
.task-page{display:block;opacity:1;padding-top:0;}
.quiz-page{display:none;opacity:0;}
.quiz-progress-bar{
    width:100%;
    height:4px;
    background:rgba(118,232,232,0.2);
    border-radius:999px;
    margin-bottom:20px;
    overflow:hidden;
}
.quiz-progress-inner{
    height:100%;
    background:linear-gradient(90deg,#ff87a2,#76e8e8);
    width:0%;
    transition:width 0.3s ease;
}
/* 关键修改：题目文字移除渐变、阴影，纯黑色，不破坏Emoji彩色符号 */
.question-text{
    font-size:22px;
    line-height:1.7;
    color:#000;
    font-weight:500;
    margin-bottom:24px;
    word-break:break-all;
}
.author-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:16px;
    color:#444;
    margin-bottom:28px;
}
.author-icon{
    width:26px;
    height:26px;
    border-radius:6px;
    background:#70c8f8;
    color:#fff;
    text-align:center;
    line-height:26px;
    font-size:14px;
}
.opt-item{
    width:100%;
    padding:16px 20px;
    border:2px solid transparent;
    border-radius:999px;
    background-image: linear-gradient(rgba(242,243,245,0.75),rgba(242,243,245,0.75)),var(--btn-grad);
    background-origin: border-box;
    background-clip: padding-box, border-box;
    text-align:left;
    font-size:18px;
    color:#222;
    margin-bottom:14px;
    cursor:pointer;
    transition:0.2s;
    transform:scale(1);
}
.opt-item:active{
    background:rgba(228, 230, 235, 0.85);
    transform:scale(0.98);
}
.opt-item:disabled{cursor:not-allowed;transform:scale(1);}
.opt-right{
    background-image: linear-gradient(rgba(214, 247, 228, 0.85),rgba(214, 247, 228, 0.85)),var(--right-grad) !important;
    color:#098639;
}
.opt-wrong{
    background-image: linear-gradient(rgba(254, 230, 230, 0.85),rgba(254, 230, 230, 0.85)),var(--wrong-grad) !important;
    color:#c42626;
}
.bottom-slogan{margin-top:50px;text-align:center;}
.slogan-box{
    display:inline-block;
    padding:8px 14px;
    background:#222;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    border-radius:6px;
    box-shadow: 0 0 14px rgba(118, 232, 232, 0.6);
}
.slogan-sub{font-size:12px;opacity:0.7;}
.bottom-line{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:8px;
    background:linear-gradient(90deg,#ffdd22 0%,#76e8e8 100%);
    z-index:1;
}
/* 压缩卡片尺寸 */
.task-card{
    background:rgba(248, 253, 254, 0.72);
    border-radius:16px;
    padding:10px 12px;
    margin-bottom:8px;
    box-shadow:0 1px 8px rgba(0,100,100,0.08);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.task-card:active{
    transform: translateY(-2px);
    box-shadow:0 4px 16px rgba(0,100,100,0.15);
}
.task-title{
    font-size:15px;
    background: var(--title-light-grad);
    -webkit-background-clip: text;
    color: transparent;
    text-shadow:0 1px 2px rgba(0,80,80,0.1);
    font-weight:600;
    margin-bottom:4px;
}
.task-desc{
    font-size:12px;
    color:#444;
    line-height:1.45;
    margin-bottom:8px;
}
.history-record{
    font-size:12px;
    color:#007777;
    margin-bottom:8px;
}
/* 公共按钮样式合并 */
.task-btn,.refresh-btn,.back-btn,.restart-btn{
    padding:6px 14px;
    border:none;
    border-radius:999px;
    font-size:13px;
    cursor:pointer;
    transition:transform 0.2s;
}
.task-btn:active,.refresh-btn:active,.back-btn:active,.restart-btn:active{
    transform:scale(0.96);
}
.task-btn{background:#ff87a2;color:#fff;margin-right:8px;}
.refresh-btn{background:#999;color:#fff;}
.restart-btn{background:#70c8f8;color:#000;padding:12px 26px;font-size:16px;}
.back-btn{background:#ff87a2;color:#fff;padding:12px 26px;font-size:16px;}
.pop-mask{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    visibility:hidden;
    transition:opacity 0.3s ease, visibility 0.3s ease;
    z-index:99;
}
.pop-mask.show{opacity:1;visibility:visible;}
.pop-inner{
    width:82%;
    max-width:400px;
    background:rgba(255,255,255,0.92);
    border-radius:20px;
    padding:32px 24px;
    text-align:center;
    border:2px solid #bcf6f6;
    transform: scale(0.9);
    transition: transform 0.3s ease;
}
.pop-mask.show .pop-inner{transform: scale(1);}
.pop-h{
    font-size:24px;
    background: var(--text-grad);
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom:14px;
}
.pop-text{font-size:17px;color:#333;margin-bottom:16px;}
.wrong-list-box{
    max-height:160px;
    overflow-y:auto;
    text-align:left;
    font-size:13px;
    color:#c42626;
    margin:12px 0 24px;
    padding:8px;
    background:rgba(254,230,230,0.4);
    border-radius:8px;
    contain: layout;
}
.pop-btn-group{display:flex;gap:12px;justify-content:center;}
.head-stat{
    display:flex;
    justify-content:flex-start;
    margin-bottom:20px;
    font-size:16px;
    color:#006666;
    font-weight:500;
}
.hidden-score{display:none;}
.load-tip{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:-1;
    color:#006666;
    font-size:16px;
    background:rgba(255,255,255,0.5);
}
@media screen and (min-width:900px){
    .quiz-page{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap:40px;
        align-items:flex-start;
    }
    .question-wrap{grid-column:1/2;}
    .opt-wrap{grid-column:2/3;}
}
</style>
</head>
<body>
<div class="load-tip" id="loadTip">页面加载中...</div>
<img class="bg-fixed" id="bgImg" loading="lazy" src="bg.jpg" alt="背景" onerror="this.style.display='none'">
<div class="mask-layer"></div>
<div class="count-wrap" id="countWrap">
    <div class="count-progress" id="countProgress"></div>
    <div class="count-circle" id="countCircle">30</div>
</div>
<div class="top-bar">
    <button class="top-icon" onclick="backTaskList()">‹</button>
    <div class="top-title">鸣潮小站答题</div>
</div>
<div class="main-wrap">
    <div class="task-page" id="taskPage">
        <div class="head-stat">
            <div class="hidden-score">
                <span id="correctNum">0</span>/<span id="totalQuizNum">0</span>
            </div>
        </div>
        <div class="task-card">
            <div class="task-title">基础题库（10题）</div>
            <div class="history-record">历史最高分：<span id="record_song10">暂无记录</span></div>
            <div class="task-desc">鸣潮基础题目，每次随机抽取10题作答，答对8题及以上完成挑战领取入站资格；单题限时20秒，答错不显示正确答案</div>
            <button class="task-btn" onclick="startQuiz('song10')">开始挑战</button>
            <button class="refresh-btn" onclick="alert('参与人数数据已刷新')">刷新</button>
        </div>
        <div class="task-card">
            <div class="task-title">综合题库（20题）</div>
            <div class="history-record">历史最高分：<span id="record_all20">暂无记录</span></div>
            <div class="task-desc">进阶答题挑战，每次随机抽取20题作答，答对16题及以上完成挑战；单题限时15秒，答错不显示正确答案</div>
            <button class="task-btn" onclick="startQuiz('all20')">开始挑战</button>
            <button class="refresh-btn" onclick="alert('参与人数数据已刷新')">刷新</button>
        </div>
        <div class="task-card">
            <div class="task-title">练习模式（15题）</div>
            <div class="history-record">单次最高答对：<span id="record_practice">暂无记录</span></div>
            <div class="task-desc">不限时刷题，从全部题库中随机抽取15题，答错会高亮正确选项。</div>
            <button class="task-btn" onclick="startQuiz('practice')">开始练习</button>
            <button class="refresh-btn" onclick="alert('参与人数数据已刷新')">刷新</button>
        </div>
    </div>
    <div class="quiz-page" id="quizPage">
        <div class="question-wrap">
            <div class="quiz-progress-bar">
                <div class="quiz-progress-inner" id="progressInner"></div>
            </div>
            <div class="question-text" id="qText"></div>
            <div class="author-row">
                <span class="author-icon">📝</span>
                <span>出题人: <span id="authorName">Shikiヽ</span></span>
            </div>
        </div>
        <div class="opt-wrap" id="optBox"></div>
        <div class="bottom-slogan">
            <div class="slogan-box">“KG老资历测试”<div class="slogan-sub">鸣潮小站 Wuthering Waves Fans</div></div>
        </div>
    </div>
</div>
<div class="bottom-line"></div>
<div class="pop-mask" id="popMask">
    <div class="pop-inner">
        <h2 class="pop-h" id="popTitle">挑战完成！</h2>
        <p class="pop-text">答对题目：<span id="popScore">0</span> 道</p>
        <div class="wrong-list-box" id="wrongBox" style="display:none;">
            <div>本次答错题目：</div>
            <div id="wrongList"></div>
        </div>
        <div class="pop-btn-group">
            <button class="restart-btn" onclick="restartCurrentMode()">再来一局</button>
            <button class="back-btn" onclick="backTaskList()">返回题库列表</button>
        </div>
    </div>
</div>
<script>
const questionBank = {
    song10:[
        {q:"维里奈的延奏效果能提供多少全伤害加深",author:"Shikiヽ",a:"15%",opts:["12%","15%","20%","25%"]},
        {q:"邮件的上限是多少封？",author:"Shikiヽ",a:"99",opts:["50","99","100","999"]},
        {q:"武器背包的上限是多少？",author:"Shikiヽ",a:"2000",opts:["500","1000","2000","3000"]},
        {q:"截至3.4版本，游戏内的编队上限是多少队？",author:"Shikiヽ",a:"10",opts:["6","8","10","12"]},
        {q:"一期冥歌海墟打满会获得多少星声？",author:"Shikiヽ",a:"800",opts:["600","800","1000","1200"]},
        {q:"一期逆境深塔打满会获得多少星声？",author:"Shikiヽ",a:"800",opts:["600","800","1000","1200"]},
        {q:"逆境深塔兑换所每个月可以换多少特级调谐器？",author:"Shikiヽ",a:"150",opts:["150","200","250","300"]},
        {q:"鉴心的延奏技能可以提供什么伤害加成？",author:"Shikiヽ",a:"共鸣解放伤害加成",opts:["共鸣技能伤害加成","共鸣解放伤害加成","气动伤害加成","普攻伤害加成"]},
        {q:"弗洛洛的声痕位于她的？",author:"超高校级的非洲人",a:"左臂",opts:["左臂","右臂","左肩","腰椎"]},
        {q:"鸣潮当前版本基础武器一共几种类型？",author:"Shikiヽ",a:"5种",opts:["3种","4种","5种","6种"]},
        {q:"截至3.4版本，菜肴的生效时间为多久？",author:"Shikiヽ",a:"30min",opts:["15min","30min","45min","60min"]},
        {q:"探索工具·钩索使用一次之后的冷却时间是多久？",author:"Shikiヽ",a:"12s",opts:["6s","8s","10s","12s"]},
        {q:"漂泊者·衍射的共鸣解放能给敌方附加几层光噪效应？",author:"Shikiヽ",a:"6",opts:["5","6","8","10"]},
        {q:"每隔多久能调整一次索拉等级？",author:"Shikiヽ",a:"12h",opts:["12h","18h","24h","48h"]},
        {q:"先约电台满级多少级？",author:"Shikiヽ",a:"70",opts:["60","70","80","90"]},
        {q:"数据坞达到多少级之后大世界就不会再掉紫色声骸？",author:"Shikiヽ",a:"15",opts:["14","15","16","20"]},
        {q:"截至3.4版本，地图的自定义标记数量上限是多少？",author:"Shikiヽ",a:"100",opts:["50","60","100","200"]},
        {q:"一个浮金波纹需要多少余波珊瑚兑换？",author:"Shikiヽ",a:"8",opts:["6","8","10","12"]},
        {q:"共鸣者的技能升到几级开始往后升需要使用紫色材料？",author:"Shikiヽ",a:"Lv5",opts:["Lv3","Lv4","Lv5","Lv6"]},
        {q:"卜灵的出生是？",author:"Shikiヽ",a:"瑝陇",opts:["新联邦","黎那汐塔","黑海岸","瑝陇"]},
        {q:"以下哪位角色用【搭档】称呼漂泊者？",author:"Shikiヽ",a:"露帕",opts:["露帕","珂莱塔","尤诺","卡提希娅"]},
        {q:"尤诺的武器类型是？",author:"Shikiヽ",a:"臂铠",opts:["臂铠","音感仪","长刃","配枪"]},
        {q:"千咲的出生是？",author:"Shikiヽ",a:"苇原",opts:["苇原","星炬学院","新联邦","拉海洛"]},
        {q:"漂泊者曾和谁一起赛过咕咕河豚？",author:"Shikiヽ",a:"忌炎",opts:["忌炎","今汐","爱弥斯","守岸人"]},
        {q:"通过空间隧道前往拉海洛时爱弥斯和漂泊者说的一句经典台词是？",author:"Shikiヽ",a:"旅途愉快",opts:["旅途愉快","但愿我会让你感到骄傲","但愿我没有让你失望","别总想着独自拯救所有"]},
        {q:"漂泊者最先解锁的三个属性是？",author:"Shikiヽ",a:"衍射、湮灭、气动",opts:["衍射、气动、导电","衍射、湮灭、气动","湮灭、气动、热熔","衍射、气动、导电"]},
        {q:"180好感度需要消耗多少体力刷副本？",author:"Shikiヽ",a:"60",opts:["40","60","120","240"]},
        {q:"维里奈的哪个动作无法回血？",author:"Shikiヽ",a:"释放变奏攻击",opts:["释放变奏攻击","释放共鸣技能","释放共鸣解放","1格回路能量时释放地面重击"]},
        {q:"菲比所属的教会叫什么名字？",author:"Shikiヽ",a:"隐海修会",opts:["隐海修会","隐海教会","爱弥斯联合","漂泊的终点"]},
        {q:"散华的哪个动作不会生成冰棘？",author:"Shikiヽ",a:"重击",opts:["共鸣技能","共鸣解放","变奏技能","重击"]},
        {q:"共鸣者总共能突破几次？",author:"Shikiヽ",a:"6",opts:["4","5","6","7"]},
        {q:"成就【独属于我的蒙娜丽莎】的达成条件是？",author:"Shikiヽ",a:"在漂泊的终点里奏响钢琴曲",opts:["完成【推演的边界】","完成【海风中失落的湛蓝回声】","在漂泊的终点里奏响钢琴曲","解开黑海岸下层的迷雾封锁"]},
        {q:"1c声骸云海妖精对什么属性有抗性提升？",author:"Shikiヽ",a:"衍射",opts:["衍射","湮灭","热熔","冷凝"]},
        {q:"探索轮盘最多能装备几种探索工具？",author:"Shikiヽ",a:"8",opts:["6","7","8","9"]},
        {q:"体力没有到上限时多久回复一点？",author:"Shikiヽ",a:"6分钟",opts:["3分钟","4分钟","5分钟","6分钟"]},
        {q:"一天的活跃度任务打满能获得多少星声？",author:"Shikiヽ",a:"60",opts:["40","60","80","90"]},
        {q:"鸣潮的月卡每天给多少星声？",author:"Shikiヽ",a:"90",opts:["80","90","120","150"]},
        {q:"突破几次能解锁角色的固有技能1？",author:"Shikiヽ",a:"2",opts:["1","2","3","4"]},

const DRAW_CONFIG = {
    song10: { drawCount: 10, passScore: 8, title: "基础10题", timeLimit:20, showRight:false },
    all20: { drawCount: 20, passScore: 16, title: "综合题20题", timeLimit:15, showRight:false },
    practice: { drawCount: 15, passScore:0, title: "练习15题", timeLimit:0, showRight:true }
};
// 统一状态对象，替代零散全局变量
const quizState = {
    type:"",
    list:[],
    index:0,
    correct:0,
    timer:null,
    remain:0,
    wrong:[],
    scrollLock:false
};
let fullBank;
// DOM缓存容器
const dom = {};
// 工具：洗牌
function shuffleArray(arr){
    const copy = [...arr];
    for(let i=copy.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [copy[i],copy[j]] = [copy[j],copy[i]];
    }
    return copy;
}
// 清理过期缓存
function cleanExpiredStorage(){
    const oneYear = 365 * 24 * 60 * 60 * 1000;
    const saveTime = localStorage.getItem("save_time") || Date.now();
    if(Number(saveTime) + oneYear < Date.now()){
        localStorage.removeItem("record_song10");
        localStorage.removeItem("record_all20");
        localStorage.removeItem("record_practice");
        localStorage.removeItem("localQuestionBank");
        localStorage.setItem("save_time", Date.now());
    }
}
// 缓存题库
function cacheQuestionBank(){
    if(!localStorage.getItem("localQuestionBank")){
        localStorage.setItem("localQuestionBank", JSON.stringify(questionBank));
        localStorage.setItem("save_time", Date.now());
    }
}
// 获取缓存题库
function getCachedBank(){
    const cache = localStorage.getItem("localQuestionBank");
    return cache ? JSON.parse(cache) : questionBank;
}
// 读取历史记录
function loadHistoryRecord(){
    dom.record_song10.innerText = localStorage.getItem("record_song10") || "暂无记录";
    dom.record_all20.innerText = localStorage.getItem("record_all20") || "暂无记录";
    dom.record_practice.innerText = localStorage.getItem("record_practice") || "暂无记录";
}
// 保存最高分
function saveRecord(type, score){
    const key = "record_"+type;
    const old = localStorage.getItem(key);
    if(old === "暂无记录" || Number(score) > Number(old)){
        localStorage.setItem(key, score);
        loadHistoryRecord();
    }
}
// 抽题
function getRandomQuestions(sourceArr, drawNum){
    return shuffleArray(sourceArr).slice(0, drawNum);
}
// 合并全题库
function getAllMixedBank(){
    return [...fullBank.song10, ...fullBank.all20];
}
// 打乱选项
function shuffleQuestionOptions(qItem){
    const originOpts = [...qItem.opts];
    const correctAns = qItem.a;
    const indexed = originOpts.map((text,idx)=>({text,idx}));
    const shuffled = shuffleArray(indexed);
    let newCorrectIdx = 0;
    const newOpts = shuffled.map((item,newIdx)=>{
        if(originOpts[item.idx] === correctAns) newCorrectIdx = newIdx;
        return item.text;
    });
    return {opts:newOpts, correctIndex:newCorrectIdx};
}
// 重置倒计时公共方法
function resetTimer(total){
    clearInterval(quizState.timer);
    quizState.remain = total;
    dom.countCircle.innerText = quizState.remain;
    dom.countWrap.classList.remove("warn");
    renderProgress(quizState.remain, total);
    startTimer(total);
}
// 渲染环形进度
function renderProgress(now, total){
    const deg = (now/total)*360;
    const color = now <=10 ? "--ring-warn" : "--ring-normal";
    dom.countProgress.style.background = `conic-gradient(var(${color}) ${deg}deg, rgba(255,255,255,0.2) ${deg}deg)`;
}
// 启动计时器
function startTimer(total){
    clearInterval(quizState.timer);
    quizState.timer = setInterval(()=>{
        quizState.remain--;
        dom.countCircle.innerText = quizState.remain;
        renderProgress(quizState.remain, total);
        if(quizState.remain <=10) dom.countWrap.classList.add("warn");
        if(quizState.remain <=0){
            clearInterval(quizState.timer);
            document.querySelectorAll(".opt-item").forEach(o=>o.disabled=true);
            quizState.wrong.push(quizState.list[quizState.index].q);
            setTimeout(nextQuestion,800);
        }
    },1000);
}
// 渲染题目（无渐变、无动画）
function renderQuestion(){
    const config = DRAW_CONFIG[quizState.type];
    if(config.timeLimit >0) resetTimer(config.timeLimit);
    const item = quizState.list[quizState.index];
    const shuffled = shuffleQuestionOptions(item);
    dom.qText.innerText = `第${quizState.index+1}题：${item.q}`;
    dom.authorName.innerText = item.author;
    dom.optBox.innerHTML = "";
    // 进度条
    const percent = (quizState.index / quizState.list.length) *100;
    dom.progressInner.style.width = percent + "%";
    shuffled.opts.forEach((txt,idx)=>{
        const btn = document.createElement("button");
        btn.className = "opt-item";
        btn.innerText = txt;
        btn.dataset.isCorrect = idx === shuffled.correctIndex ? "1" : "0";
        btn.onclick = ()=>selectOpt(btn);
        dom.optBox.appendChild(btn);
    })
}
// 选择答案（防抖：点击直接全部禁用，杜绝连点）
function selectOpt(btn){
    clearInterval(quizState.timer);
    const config = DRAW_CONFIG[quizState.type];
    const allOpts = document.querySelectorAll(".opt-item");
    if(allOpts[0].disabled) return;
    allOpts.forEach(o=>o.disabled = true);
    const isRight = btn.dataset.isCorrect === "1";
    if(isRight){
        btn.classList.add("opt-right");
        quizState.correct++;
        dom.correctNum.innerText = quizState.correct;
    }else{
        btn.classList.add("opt-wrong");
        quizState.wrong.push(quizState.list[quizState.index].q);
        if(config.showRight) allOpts.forEach(b=>{if(b.dataset.isCorrect==="1") b.classList.add("opt-right");});
    }
    setTimeout(nextQuestion,800);
}
// 下一题/结算
function nextQuestion(){
    quizState.index++;
    const percent = (quizState.index / quizState.list.length) *100;
    dom.progressInner.style.width = percent + "%";
    if(quizState.index >= quizState.list.length){
        clearInterval(quizState.timer);
        dom.countWrap.style.display = "none";
        dom.popScore.innerText = quizState.correct;
        saveRecord(quizState.type, quizState.correct);
        dom.wrongBox.style.display = quizState.wrong.length ? "block" : "none";
        dom.wrongList.innerText = quizState.wrong.join("、");
        const cfg = DRAW_CONFIG[quizState.type];
        dom.popTitle.innerText = cfg.passScore ===0 
            ? "练习完成！本次答题结束" 
            : quizState.correct >= cfg.passScore 
                ? "挑战达标！可领取入站资格" 
                : `未达标，至少答对${cfg.passScore}题`;
        dom.popMask.classList.add("show");
        return;
    }
    renderQuestion();
}
// 再来一局
function restartCurrentMode(){
    dom.popMask.classList.remove("show");
    startQuiz(quizState.type);
}
// 开始答题
function startQuiz(type){
    clearInterval(quizState.timer);
    quizState.type = type;
    const config = DRAW_CONFIG[type];
    quizState.wrong = [];
    const source = type === "practice" ? getAllMixedBank() : fullBank[type];
    quizState.list = getRandomQuestions(source, config.drawCount);
    quizState.index = 0;
    quizState.correct = 0;
    dom.totalQuizNum.innerText = quizState.list.length;
    dom.correctNum.innerText = "0";
    // 页面切换
    dom.taskPage.style.opacity = "0";
    setTimeout(()=>{
        dom.taskPage.style.display = "none";
        dom.quizPage.style.display = "block";
        setTimeout(()=>dom.quizPage.style.opacity = "1",50);
    },300);
    dom.progressInner.style.width = "0%";
    if(config.timeLimit >0){
        dom.countWrap.style.display = "flex";
        resetTimer(config.timeLimit);
    }else{
        dom.countWrap.style.display = "none";
    }
    renderQuestion();
}
// 返回首页
function backTaskList(){
    clearInterval(quizState.timer);
    dom.countWrap.style.display = "none";
    dom.popMask.classList.remove("show");
    // 页面淡出
    dom.quizPage.style.opacity = "0";
    setTimeout(()=>{
        dom.quizPage.style.display = "none";
        dom.taskPage.style.display = "block";
        setTimeout(()=>dom.taskPage.style.opacity = "1",50);
    },300);
    dom.correctNum.innerText = "0";
    dom.totalQuizNum.innerText = "0";
}
// 视差滚动节流
function handleScroll(){
    if(quizState.scrollLock) return;
    requestAnimationFrame(()=>{
        const y = window.scrollY;
        dom.bgImg.style.transform = `translateY(${y*0.12}px) scale(1.01)`;
        quizState.scrollLock = false;
    });
    quizState.scrollLock = true;
}
// 初始化
window.onload = function(){
    // 一次性缓存DOM
    dom.taskPage = document.getElementById("taskPage");
    dom.quizPage = document.getElementById("quizPage");
    dom.qText = document.getElementById("qText");
    dom.optBox = document.getElementById("optBox");
    dom.popMask = document.getElementById("popMask");
    dom.popScore = document.getElementById("popScore");
    dom.popTitle = document.getElementById("popTitle");
    dom.correctNum = document.getElementById("correctNum");
    dom.totalQuizNum = document.getElementById("totalQuizNum");
    dom.authorName = document.getElementById("authorName");
    dom.countCircle = document.getElementById("countCircle");
    dom.countProgress = document.getElementById("countProgress");
    dom.countWrap = document.getElementById("countWrap");
    dom.wrongBox = document.getElementById("wrongBox");
    dom.wrongList = document.getElementById("wrongList");
    dom.progressInner = document.getElementById("progressInner");
    dom.loadTip = document.getElementById("loadTip");
    dom.bgImg = document.getElementById("bgImg");
    dom.record_song10 = document.getElementById("record_song10");
    dom.record_all20 = document.getElementById("record_all20");
    dom.record_practice = document.getElementById("record_practice");
    // 缓存题库
    cleanExpiredStorage();
    cacheQuestionBank();
    fullBank = getCachedBank();
    loadHistoryRecord();
    // 隐藏加载提示
    setTimeout(()=>{
        dom.loadTip.style.display = "none";
    }, 400);
    // 遮罩点击关闭弹窗
    dom.popMask.addEventListener("click", (e)=>{
        if(e.target === dom.popMask) dom.popMask.classList.remove("show");
    });
    // 绑定滚动节流
    window.addEventListener("scroll", handleScroll);
}
</script>
</body>
